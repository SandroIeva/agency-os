<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#111117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

      @keyframes ai-caret-blink { 0%, 100% { opacity: 0.55; } 50% { opacity: 0; } }
    </style>
  </head>
