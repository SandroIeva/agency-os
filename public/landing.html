<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>i7 OS — Coming Soon</title>
<meta name="description" content="i7 OS — The operating system for modern agencies. Coming soon." />
<meta property="og:title" content="i7 OS — Coming Soon" />
<meta property="og:description" content="The operating system for modern agencies." />
<meta property="og:image" content="https://i7os.com/logo-dark.svg" />
<link rel="icon" type="image/svg+xml" href="/logo-dark.svg" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; color: #ffffff; }
  body { background: #0a0a14; overflow: hidden; }

  /* Background gradient — same vibe as the onboarding hero */
  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(60% 50% at 80% 30%, rgba(91, 107, 255, 0.45) 0%, transparent 60%),
      radial-gradient(50% 45% at 15% 75%, rgba(139, 122, 255, 0.30) 0%, transparent 65%),
      linear-gradient(135deg, #0e0e1a 0%, #131325 100%);
    z-index: 0;
  }
  .grain {
    position: fixed; inset: 0; pointer-events: none; opacity: 0.05;
    background-image:
      repeating-radial-gradient(circle at 17% 22%, rgba(255,255,255,0.4) 0px, transparent 1px),
      repeating-radial-gradient(circle at 63% 78%, rgba(255,255,255,0.3) 0px, transparent 1px);
    z-index: 1;
  }

  .wrap {
    position: relative; z-index: 2;
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .logo { margin-bottom: 56px; opacity: 0; animation: fadeUp 0.7s 0.1s ease-out forwards; }
  .logo img { width: 160px; height: auto; display: block; filter: invert(1); }

  .tag {
    font-size: 11px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.5); margin-bottom: 18px;
    opacity: 0; animation: fadeUp 0.7s 0.3s ease-out forwards;
  }

  h1 {
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 400; line-height: 1.15; letter-spacing: -1px;
    margin: 0 0 22px; max-width: 720px;
    opacity: 0; animation: fadeUp 0.7s 0.45s ease-out forwards;
  }
  h1 .accent { font-weight: 500; background: linear-gradient(135deg, #C8C3FF, #8B7AFF 60%, #5B6BFF); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

  p.lede {
    font-size: 16px; line-height: 1.7; max-width: 540px;
    color: rgba(255,255,255,0.65); margin: 0 0 40px;
    opacity: 0; animation: fadeUp 0.7s 0.6s ease-out forwards;
  }

  .cta {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 26px; border-radius: 999px;
    background: #ffffff; color: #1a1a2e;
    text-decoration: none; font-weight: 500; font-size: 14px;
    transition: transform 0.15s ease, box-shadow 0.25s ease;
    box-shadow: 0 14px 40px rgba(91, 107, 255, 0.25);
    opacity: 0; animation: fadeUp 0.7s 0.75s ease-out forwards;
  }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 18px 50px rgba(91, 107, 255, 0.4); }
  .cta svg { width: 14px; height: 14px; }

  .links {
    margin-top: 64px;
    display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
    opacity: 0; animation: fadeUp 0.7s 0.9s ease-out forwards;
  }
  .links a { color: rgba(255,255,255,0.45); font-size: 12px; text-decoration: none; letter-spacing: 0.3px; }
  .links a:hover { color: rgba(255,255,255,0.85); }

  footer {
    position: fixed; left: 0; right: 0; bottom: 24px; z-index: 2;
    text-align: center; font-size: 11px; color: rgba(255,255,255,0.3);
    letter-spacing: 0.5px;
    opacity: 0; animation: fade 0.8s 1.1s ease-out forwards;
  }
  footer a { color: rgba(255,255,255,0.5); text-decoration: none; }
  footer a:hover { color: rgba(255,255,255,0.8); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 600px) {
    .logo { margin-bottom: 36px; }
    .logo img { width: 120px; }
    .links { margin-top: 44px; gap: 16px; }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="grain"></div>

<div class="wrap">
  <div class="logo">
    <img src="/logo-dark.svg" alt="i7 OS" />
  </div>

  <div class="tag">Coming soon</div>

  <h1>The operating system for <span class="accent">modern agencies.</span></h1>

  <p class="lede">A single workspace for projects, brands, files, calendar and AI — designed for how creative teams really work. Currently in private beta.</p>

  <a class="cta" href="https://alpha.i7os.com">
    Enter alpha
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>

  <div class="links">
    <a href="mailto:support@i7os.com">support@i7os.com</a>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
  </div>
</div>

<footer>
  © <span id="y"></span> Sandro Ieva · Lübeck, Germany
</footer>

<script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
