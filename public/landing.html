<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>i7 OS — Coming Soon</title>
<meta name="description" content="i7 OS — The operating system for modern agencies. Coming soon." />
<meta property="og:title" content="i7 OS — Coming Soon" />
<meta property="og:description" content="The operating system for modern agencies." />
<link rel="icon" type="image/svg+xml" href="/logo-dark.svg" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; color: #ffffff; }
  body { background: #111117; }

  .wrap {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .logo { margin-bottom: 56px; opacity: 0; animation: fadeUp 0.7s 0.1s ease-out forwards; }
  .logo img { width: 160px; height: auto; display: block; filter: invert(1); opacity: 0.9; }

  h1 {
    font-size: 28px; font-weight: 300; line-height: 1.3;
    letter-spacing: -0.5px;
    margin: 0 0 12px; max-width: 540px;
    color: #ffffffCC;
    opacity: 0; animation: fadeUp 0.7s 0.3s ease-out forwards;
  }

  p {
    font-size: 14px; line-height: 1.65; max-width: 440px;
    color: #ffffff60; margin: 0 0 36px;
    opacity: 0; animation: fadeUp 0.7s 0.45s ease-out forwards;
  }

  a.cta {
    display: inline-flex; align-items: center; gap: 8px;
    color: #ffffff90; text-decoration: none;
    font-size: 13px; letter-spacing: 0.2px;
    padding: 4px 0;
    border-bottom: 1px solid #ffffff20;
    transition: color 0.15s ease, border-color 0.15s ease;
    opacity: 0; animation: fadeUp 0.7s 0.6s ease-out forwards;
  }
  a.cta:hover { color: #ffffffEE; border-color: #ffffff80; }
  a.cta svg { width: 12px; height: 12px; }

  footer {
    position: fixed; left: 0; right: 0; bottom: 24px;
    text-align: center; font-size: 11px; color: #ffffff30;
    letter-spacing: 0.4px;
    opacity: 0; animation: fade 0.8s 1s ease-out forwards;
  }
  footer .links { display: inline-flex; gap: 18px; }
  footer a { color: #ffffff45; text-decoration: none; }
  footer a:hover { color: #ffffff80; }
  footer .sep { color: #ffffff20; margin: 0 2px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 600px) {
    .logo { margin-bottom: 40px; }
    .logo img { width: 120px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <img src="/logo-dark.svg" alt="i7 OS" />
  </div>

  <h1>Coming soon.</h1>
  <p>The operating system for modern agencies. Currently in private alpha.</p>

  <a class="cta" href="https://alpha.i7os.com">
    Enter alpha
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>
</div>

<footer>
  <div class="links">
    <a href="mailto:support@i7os.com">support@i7os.com</a>
    <span class="sep">·</span>
    <a href="/privacy">Privacy</a>
    <span class="sep">·</span>
    <a href="/terms">Terms</a>
  </div>
</footer>
</body>
</html>
